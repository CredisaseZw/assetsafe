<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
            background-color: #f4f4f7;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #003366; /* Dark Blue */
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .content {
            padding: 30px 40px;
        }
        .content p {
            margin: 0 0 15px;
        }
        .footer {
            background-color: #f4f4f7;
            color: #777;
            padding: 20px;
            text-align: center;
            font-size: 12px;
        }
        .footer p {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Password Changed</h1>
        </div>
        <div class="content">
            <p>Hello {{ user.first_name }},</p>
            <p>This is a confirmation that the password for your AssetSafe account has been changed.</p>
            <p>If you did not make this change, please contact our support team immediately.</p>
            <p>Thank you,<br>The AssetSafe Team</p>
        </div>
        <div class="footer">
            <p>&copy; {% now "Y" %} AssetSafe. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
